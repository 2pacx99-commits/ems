<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول الهلال الأحمر - TORONTO RP</title>
    <!-- استيراد خطوط Google -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- استيراد مكتبات Firebase المتوافقة (Compat) لتجنب مشاكل الـ Modules -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-database-compat.js"></script>

    <style>
        :root {
            --bg-primary: #0a0b10;
            --bg-secondary: #121420;
            --bg-card: #1a1d30;
            --accent-color: #ff2a5f;
            --accent-glow: rgba(255, 42, 95, 0.4);
            --text-main: #ffffff;
            --text-muted: #8b9bb4;
            --border-color: #262b4c;
            --success: #00ff87;
            --warning: #fffb00;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Cairo', sans-serif;
            user-select: none;
        }

        body {
            background-color: var(--bg-primary);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            overflow-x: hidden;
            background-image: 
                radial-gradient(at 10% 20%, rgba(255, 42, 95, 0.05) 0px, transparent 50%),
                radial-gradient(at 90% 80%, rgba(0, 255, 135, 0.03) 0px, transparent 50%);
        }

        header {
            background: linear-gradient(180deg, var(--bg-secondary) 0%, rgba(18,20,32,0.8) 100%);
            border-bottom: 1px solid var(--border-color);
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(10px);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .logo-area {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .logo-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--accent-color), #ff6b8b);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .logo-icon i {
            font-size: 24px;
            color: #white;
        }

        .logo-text h1 {
            font-size: 20px;
            font-weight: 900;
            letter-spacing: 1px;
            background: linear-gradient(45deg, #fff, var(--text-muted));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .logo-text span {
            font-size: 11px;
            color: var(--accent-color);
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .nav-controls {
            display: flex;
            gap: 15px;
            align-items: center;
        }

        .btn {
            background: var(--bg-card);
            border: 1px solid var(--border-color);
            color: var(--text-main);
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: 600;
            font-size: 14px;
            display: flex;
            align-items: center;
            gap: 8px;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .btn:hover {
            border-color: var(--accent-color);
            box-shadow: 0 0 10px rgba(255, 42, 95, 0.2);
            transform: translateY(-2px);
        }

        .btn-admin {
            background: linear-gradient(135deg, #1e1b4b 0%, #311042 100%);
            border-color: #4c1d95;
        }

        .btn-admin.active {
            background: linear-gradient(135deg, var(--accent-color) 0%, #b91c1c 100%);
            border-color: var(--accent-color);
            box-shadow: 0 0 15px var(--accent-glow);
        }

        .btn-danger {
            background: #7f1d1d;
            border-color: #991b1b;
        }

        .btn-danger:hover {
            background: #991b1b;
            border-color: #ef4444;
            box-shadow: 0 0 15px rgba(239, 68, 68, 0.4);
        }

        main {
            flex: 1;
            padding: 40px;
            max-width: 1600px;
            width: 100%;
            margin: 0 auto;
            box-sizing: border-box;
        }

        .table-container {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
            margin-bottom: 30px;
            opacity: 0;
            transform: translateY(20px);
            animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards;
        }

        @keyframes fadeInUp {
            to { opacity: 1; transform: translateY(0); }
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: right;
        }

        th {
            background-color: rgba(26, 29, 48, 0.8);
            padding: 18px 24px;
            font-weight: 700;
            font-size: 14px;
            color: var(--text-muted);
            border-bottom: 2px solid var(--border-color);
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px 24px;
            border-bottom: 1px solid rgba(38, 43, 76, 0.5);
            font-size: 15px;
            font-weight: 600;
            transition: all 0.2s ease;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover td {
            background-color: rgba(26, 29, 48, 0.4);
        }

        .rank-badge {
            display: inline-block;
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 12px;
            font-weight: 700;
            border: 1px solid transparent;
        }

        .rank-leader { background: rgba(239, 68, 68, 0.1); color: #ef4444; border-color: rgba(239, 68, 68, 0.2); }
        .rank-subleader { background: rgba(245, 158, 11, 0.1); color: #f59e0b; border-color: rgba(245, 158, 11, 0.2); }
        .rank-captain { background: rgba(168, 85, 247, 0.1); color: #a855f7; border-color: rgba(168, 85, 247, 0.2); }
        .rank-doc { background: rgba(59, 130, 246, 0.1); color: #3b82f6; border-color: rgba(59, 130, 246, 0.2); }
        .rank-paramedic { background: rgba(16, 185, 129, 0.1); color: #10b981; border-color: rgba(16, 185, 129, 0.2); }

        .editable-cell {
            position: relative;
            cursor: pointer;
        }

        .editable-cell:hover {
            color: var(--accent-color);
        }

        .admin-mode .editable-cell:hover::after {
            content: '\f304';
            font-family: 'Font Awesome 5 Free';
            font-weight: 900;
            position: absolute;
            left: 10px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 12px;
            opacity: 0.7;
        }

        .cell-input {
            width: 100%;
            background: var(--bg-card);
            border: 1px solid var(--accent-color);
            color: var(--text-main);
            padding: 8px 12px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            outline: none;
            box-shadow: 0 0 10px rgba(255, 42, 95, 0.1);
        }

        .toast-container {
            position: fixed;
            bottom: 30px;
            left: 30px;
            z-index: 1000;
        }

        .toast {
            background: var(--bg-secondary);
            border: 1px solid var(--border-color);
            border-left: 4px solid var(--accent-color);
            color: var(--text-main);
            padding: 16px 24px;
            border-radius: 8px;
            font-weight: 600;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            display: flex;
            align-items: center;
            gap: 12px;
            margin-top: 10px;
            transform: translateX(-120%);
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .toast.show {
            transform: translateX(0);
        }

        .pending-save-bar {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(90deg, #1e1b4b 0%, #311042 100%);
            border-top: 1px solid #4c1d95;
            padding: 15px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            z-index: 99;
        }

        .pending-save-bar.show {
            transform: translateY(0);
        }

        .pending-text {
            font-size: 14px;
            font-weight: 600;
            color: #c084fc;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .pending-text i {
            animation: spin 2s linear infinite;
        }

        @keyframes spin {
            100% { transform: rotate(-360deg); }
        }
    </style>
</head>
<body>

    <header>
        <div class="logo-area">
            <div class="logo-icon">
                <i class="fa-solid fa-heart-pulse"></i>
            </div>
            <div class="logo-text">
                <h1>الهلال الأحمر</h1>
                <span>Toronto Roleplay</span>
            </div>
        </div>
        <div class="nav-controls">
            <button class="btn btn-admin" id="adminToggleBtn" onclick="toggleAdminMode()">
                <i class="fa-solid fa-lock"></i> وضع المسؤول
            </button>
            <button class="btn btn-danger" id="resetBtn" onclick="confirmResetWeek()" style="display: none;">
                <i class="fa-solid fa-trash-can"></i> تصفير الأسبوع
            </button>
        </div>
    </header>

    <main>
        <div class="table-container">
            <table>
                <thead>
                    <tr>
                        <th style="width: 80px;">الرقم الرقمي</th>
                        <th>الاسم الشخصي</th>
                        <th>الرتبة العسكرية</th>
                        <th>عدد البلاغات</th>
                        <th>حالة التفاعل الآلي</th>
                        <th>ملاحظات الإدارة العليا</th>
                    </tr>
                </thead>
                <tbody id="tableBody">
                    <!-- سيتم توليد الصفوف برمجياً -->
                </tbody>
            </table>
        </div>
    </main>

    <div class="pending-save-bar" id="pendingSaveBar">
        <div class="pending-text">
            <i class="fa-solid fa-circle-notch"></i> هناك تعديلات غير محفوظة في السحابة...
        </div>
        <button class="btn btn-admin active" onclick="saveDataToFirebase()">
            <i class="fa-solid fa-cloud-arrow-up"></i> حفظ التغييرات الآن
        </button>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        // إعدادات مشروع Firebase الخاص بك
        const firebaseConfig = {
            apiKey: "AIzaSyDdgad2rzQ1eQWDQZp2dlfsZfl8CMz9UW4",
            authDomain: "toronto-45374.firebaseapp.com",
            databaseURL: "https://toronto-45374-default-rtdb.firebaseio.com",
            projectId: "toronto-45374",
            storageBucket: "toronto-45374.firebasestorage.app",
            messagingSenderId: "895878429326",
            appId: "1:895878429326:web:526d25948751604e8967df"
        };

        // تهيئة الـ App وقاعدة البيانات
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        // البيانات الافتراضية للجدول في حال كانت قاعدة البيانات فارغة لأول مرة
        const defaultData = [
            { id: "101", name: "أحمد المالي", rank: "leader", reports: 24, status: "نشط جداً", notes: "ملتزم بالخفارات الليلية" },
            { id: "102", name: "مصطفى الجابري", rank: "subleader", reports: 18, status: "نشط", notes: "توجيهات مستمرة للمستجدين" },
            { id: "105", name: "حسين الساعدي", rank: "captain", reports: 15, status: "نشط", notes: "مسؤول تدريب طاقم الإسعاف" },
            { id: "110", name: "علي الكناني", rank: "doc", reports: 9, status: "متوسط التفاعل", notes: "يحتاج زيادة ساعات التواجد" },
            { id: "115", name: "سجاد الكعبي", rank: "paramedic", reports: 3, status: "ضعيف التفاعل", notes: "تنبيه أخير قبل الخفض" }
        ];

        let emsData = [];
        let isAdmin = false;
        let hasPendingChanges = false;

        // دالة تحديد شكل الرتبة باللغة العربية واللون
        const rankLabels = {
            leader: { text: "مدير الهلال الأحمر", class: "rank-leader" },
            subleader: { text: "معاون مدير", class: "rank-subleader" },
            captain: { text: "نقيب طبيب", class: "rank-captain" },
            doc: { text: "دكتور جراح", class: "rank-doc" },
            paramedic: { text: "مسعف أولي", class: "rank-paramedic" }
        };

        // الاستماع للتغيرات في Firebase وجلب البيانات فوراً
        db.ref('emsData').on('value', (snapshot) => {
            const data = snapshot.val();
            if (data) {
                emsData = data;
            } else {
                // إذا كانت قاعدة البيانات فارغة تماماً، نرفع البيانات الافتراضية
                emsData = defaultData;
                db.ref('emsData').set(emsData);
            }
            if (!hasPendingChanges) {
                renderTable();
            }
        });

        // بناء الجدول وعرضه للمستخدمين
        function renderTable() {
            const tbody = document.getElementById("tableBody");
            tbody.innerHTML = "";

            emsData.forEach((row, index) => {
                const tr = document.createElement("tr");
                const rankInfo = rankLabels[row.rank] || { text: row.rank, class: "" };

                tr.innerHTML = `
                    <td>#${row.id}</td>
                    <td>${row.name}</td>
                    <td><span class="rank-badge ${rankInfo.class}">${rankInfo.text}</span></td>
                    <td class="editable-cell" onclick="startEdit(${index}, 'reports', this)">${row.reports}</td>
                    <td class="editable-cell" onclick="startEdit(${index}, 'status', this)">${row.status}</td>
                    <td class="editable-cell" onclick="startEdit(${index}, 'notes', this)">${row.notes}</td>
                `;
                tbody.appendChild(tr);
            });
        }

        // تشغيل وإطفاء وضع الإدارة
        function toggleAdminMode() {
            isAdmin = !isAdmin;
            const btn = document.getElementById("adminToggleBtn");
            const resetBtn = document.getElementById("resetBtn");
            const body = document.body;

            if (isAdmin) {
                btn.classList.add("active");
                btn.innerHTML = `<i class="fa-solid fa-lock-open"></i> إنهاء وضع المسؤول`;
                resetBtn.style.display = "flex";
                body.classList.add("admin-mode");
                showToast("تم الدخول بصلاحيات المسؤول. يمكنك الآن تعديل خلايا البلاغات والملاحظات بالضغط عليها مباشرة.");
            } else {
                btn.classList.remove("active");
                btn.innerHTML = `<i class="fa-solid fa-lock"></i> وضع المسؤول`;
                resetBtn.style.display = "none";
                body.classList.remove("admin-mode");
                discardOrSavePrompt();
            }
        }

        // بدء عملية تعديل الخلية عند الضغط عليها
        function startEdit(index, field, cellElement) {
            if (!isAdmin) {
                showToast("عذراً، يجب تفعيل وضع المسؤول لتتمكن من التعديل!");
                return;
            }

            if (cellElement.querySelector('input')) return;

            const originalValue = emsData[index][field];
            const input = document.createElement('input');
            input.type = field === 'reports' ? 'number' : 'text';
            input.className = 'cell-input';
            input.value = originalValue;

            cellElement.innerHTML = '';
            cellElement.appendChild(input);
            input.focus();

            // عند الخروج من الحقل أو ضغط Enter
            input.addEventListener('blur', () => finishEdit(index, field, input.value, cellElement, originalValue));
            input.addEventListener('keydown', (e) => {
                if (e.key === 'Enter') input.blur();
            });
        }

        // إنهاء تعديل الخلية وحفظه مؤقتاً في الذاكرة
        function finishEdit(index, field, newValue, cellElement, originalValue) {
            let processedValue = newValue.trim();
            if (field === 'reports') {
                processedValue = parseInt(processedValue) || 0;
            }

            if (processedValue !== originalValue) {
                emsData[index][field] = processedValue;
                hasPendingChanges = true;
                document.getElementById("pendingSaveBar").classList.add("show");
            }

            renderTable();
        }

        // رفع البيانات النهائية إلى قاعدة بيانات Firebase
        function saveDataToFirebase() {
            db.ref('emsData').set(emsData).then(() => {
                showToast("تم مزامنة وحفظ جميع البيانات في السحابة بنجاح! ☁️✔️");
                hasPendingChanges = false;
                document.getElementById("pendingSaveBar").classList.remove("show");
            }).catch((error) => {
                showToast("فشل الحفظ، تأكد من اتصالك بالإنترنت وصلاحيات قاعدة البيانات.");
                console.error(error);
            });
        }

        // تصفير الأسبوع للإدارة
        function confirmResetWeek() {
            if (!isAdmin) return;
            if (confirm("⚠️ هل أنت متأكد تماماً من رغبتك في تصفير الأسبوع؟ سيتم تصفير جميع البلاغات وحذف الملاحظات لكل الموظفين!")) {
                emsData = emsData.map(row => ({
                    ...row,
                    reports: 0,
                    status: "انتظار التفاعل",
                    notes: "بداية أسبوع جديدة"
                }));
                hasPendingChanges = true;
                document.getElementById("pendingSaveBar").classList.add("show");
                renderTable();
                showToast("تم تصفير البيانات محلياً، لا تنسى الضغط على زر الحفظ بالأسفل لتعميمها على الجميع.");
            }
        }

        function discardOrSavePrompt() {
            if (hasPendingChanges) {
                if (confirm("لديك تعديلات غير محفوظة في قاعدة البيانات. هل تريد حفظها الآن قبل الخروج؟")) {
                    saveDataToFirebase();
                } else {
                    hasPendingChanges = false;
                    document.getElementById("pendingSaveBar").classList.remove("show");
                    // إعادة جلب البيانات الأصلية من الـ Database لإلغاء التعديلات المحلية
                    db.ref('emsData').once('value', (snapshot) => {
                        if (snapshot.val()) {
                            emsData = snapshot.val();
                            renderTable();
                        }
                    });
                }
            }
        }

        // نظام التنبيهات المنبثقة الجذاب (Toast Notifications)
        function showToast(text) {
            const container = document.getElementById("toastContainer");
            const toast = document.createElement("div");
            toast.className = "toast";
            toast.innerHTML = `<i class="fa-solid fa-circle-info" style="color: var(--accent-color);"></i> <span>${text}</span>`;
            
            container.appendChild(toast);
            setTimeout(() => toast.classList.add("show"), 50);

            setTimeout(() => {
                toast.classList.remove("show");
                setTimeout(() => toast.remove(), 400);
            }, 5000);
        }
    </script>
</body>
</html>
