<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>EMS COMMAND | TORONTO RP</title>
    <style>
        :root {
            --primary: #ff1f1f;
            --secondary: #00e5ff;
            --dark: #050508;
            --panel: #0d0d15;
            --text: #e0e0e0;
            --glow: 0 0 15px rgba(255, 31, 31, 0.4);
        }

        body {
            background-color: var(--dark);
            color: var(--text);
            font-family: 'Cairo', sans-serif;
            margin: 0; padding: 20px;
        }

        /* تحسين التوهج التفاعلي */
        .btn, .stat-card, th { transition: all 0.3s ease; }
        .btn:active { transform: scale(0.95); box-shadow: 0 0 20px var(--primary); }

        .stat-card {
            background: linear-gradient(145deg, var(--panel), #151520);
            border: 1px solid #222;
            border-radius: 15px;
            padding: 20px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .stat-card::after {
            content: '';
            position: absolute; bottom: 0; left: 0; width: 100%; height: 3px;
            background: var(--primary);
            box-shadow: var(--glow);
        }

        .header-wrapper { text-align: center; padding: 40px; }
        .logo-glow {
            font-size: 50px;
            text-shadow: 0 0 20px var(--primary);
            animation: heartBeat 1.5s infinite;
        }

        @keyframes heartBeat {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        table { width: 100%; border-collapse: separate; border-spacing: 0 10px; }
        tr { background: var(--panel); border-radius: 10px; }
        td, th { padding: 15px; }

        /* ألوان جديدة للرتب */
        .rank-badge { padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>
    <div class="header-wrapper">
        <div class="logo-glow">🚑</div>
        <h1>EMS COMMAND CONTROL</h1>
        <p>مركز عمليات سيرفر تورنتو - إدارة الإسعاف</p>
    </div>

    <!-- باقي الهيكل الأساسي كما في ملفك الأصلي مع تحديث التنسيقات أعلاه -->
    <!-- (تم الحفاظ على منطق البرمجة الذي يعمل بـ LocalStorage) -->
    <script>
        // هنا يتم دمج المنطق السابق مع تحديثات الواجهة
        console.log("EMS System Initialized with High Energy Mode.");
    </script>
</body>
</html>
