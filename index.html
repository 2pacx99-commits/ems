<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم تورونتو - الهلال الأحمر</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #1a1a1a;
            color: #ffffff;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
            background: #262626;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 { text-align: center; color: #ff4d4d; }
        input, button {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 5px;
            border: 1px solid #444;
            background: #333;
            color: #fff;
            box-sizing: border-box;
        }
        button {
            background: #ff4d4d;
            cursor: pointer;
            font-weight: bold;
        }
        button:hover { background: #cc0000; }
        .page { display: none; }
        .active { display: block; }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            border: 1px solid #444;
            text-align: center;
        }
        th { background-color: #ff4d4d; color: white; }
        tr:nth-child(even) { background-color: #333; }
        .admin-info {
            background: #333;
            padding: 10px;
            border-radius: 5px;
            margin-bottom: 20px;
            font-size: 14px;
        }
    </style>
</head>
<body>

<div class="container">
    
    <div id="login-page" class="page active">
        <h2>تسجيل دخول الأدمن</h2>
        <label>اسم المستخدم (الأدمن):</label>
        <input type="text" id="username" placeholder="اكتب اسمك هنا...">
        
        <label>كلمة المرور:</label>
        <input type="password" id="password" placeholder="اكتب الباسورد...">
        
        <button onclick="checkLogin()">تسجيل الدخول</button>
    </div>

    <div id="dashboard-page" class="page">
        <h2>لوحة التحكم الحية</h2>
        <div class="admin-info">
            مرحباً بك: <strong id="active-admin-name" style="color: #ff4d4d;"></strong> داخل لوحة التحكم.
            <button onclick="logout()" style="width: auto; float: left; padding: 5px 10px; margin: 0;">تسجيل خروج</button>
            <div style="clear: both;"></div>
        </div>

        <div style="background: #333; padding: 15px; border-radius: 5px;">
            <h3>إضافة سجل جديد (سيظهر عند الجميع فوراً)</h3>
            <input type="text" id="record-title" placeholder="عنوان السجل أو الاسم...">
            <input type="text" id="record-desc" placeholder="التفاصيل أو الحالة...">
            <button onclick="addNewRecord()">إضافة إلى قاعدة البيانات</button>
        </div>

        <h3>البيانات الحالية في الداتا بيس:</h3>
        <table>
            <thead>
                <tr>
                    <th>المُعرّف</th>
                    <th>العنوان / الاسم</th>
                    <th>التفاصيل / الحالة</th>
                </tr>
            </thead>
            <tbody id="data-table-body">
                </tbody>
        </table>
    </div>

</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getDatabase, ref, set, push, onValue } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

    // إعدادات قاعدة البيانات الخاصة بمشروعك (تورونتو)
    const firebaseConfig = {
      apiKey: "AIzaSyDdgaD2rzQ1eQWDQZp2dLfsZfL8CMz9UW4",
      authDomain: "toronto-45374.firebaseapp.com",
      databaseURL: "https://toronto-45374-default-rtdb.firebaseio.com",
      projectId: "toronto-45374",
      storageBucket: "toronto-45374.appspot.com",
      messagingSenderId: "895878429326",
      appId: "1:895878429326:web:526d25948751604e8967df"
    };

    // تشغيل الفايربيس
    const app = initializeApp(firebaseConfig);
    const database = getDatabase(app);

    // دالة التحقق من تسجيل الدخول (اربطها بالباسورد الخاص بك)
    window.checkLogin = function() {
        const user = document.getElementById("username").value.trim();
        const pass = document.getElementById("password").value;

        if(user === "" || pass === "") {
            alert("الرجاء كتابة اسم المستخدم والباسورد");
            return;
        }

        // هنا تضع الباسورد الذي تريده (مثلاً: 1234)
        if(pass === "1234") { 
            handleAdminLogin(user);
        } else {
            alert("كلمة المرور خاطئة!");
        }
    }

    // إدارة جلسة الأدمن ورفعها للداتا بيس
    function handleAdminLogin(adminUsername) {
        const currentSessionId = Date.now().toString(); 
        
        // حفظ البيانات في متصفح الجهاز الحالي
        localStorage.setItem("current_admin_user", adminUsername);
        localStorage.setItem("admin_session_id", currentSessionId);

        // رفع الجلسة للفايربيس تحت اسم هذا الأدمن بالتحديد
        set(ref(database, 'active_sessions/' + adminUsername), {
            sessionId: currentSessionId,
            lastLogin: new Date().toISOString()
        })
        .then(() => {
            showDashboard(adminUsername);
            watchAdminSession(adminUsername, currentSessionId);
            listenToLiveData();
        })
        .catch((error) => {
            alert("خطأ في الاتصال بالداتا بيس: " + error.message);
        });
    }

    // دالة مراقبة الأدمن وطرد الجلسات المكررة (Single Session)
    function watchAdminSession(adminUsername, localSessionId) {
        const sessionRef = ref(database, 'active_sessions/' + adminUsername);

        // الاستماع الحي فوراً وبدون ريفريش
        onValue(sessionRef, (snapshot) => {
            const data = snapshot.val();
            
            // لو الـ sessionId بالداتا بيس اختلف عن المتصفح، يعني شخص ثاني دخل بنفس الاسم
            if (data && data.sessionId !== localSessionId) {
                alert(`تنبيه أمني: تم تسجيل الدخول إلى حساب الأدمن (${adminUsername}) من جهاز آخر!`);
                forceLogout();
            }
        });
    }

    // إضافة سجل جديد لقاعدة البيانات (مثال على إرسال البيانات للتحديث الحي)
    window.addNewRecord = function() {
        const title = document.getElementById("record-title").value.trim();
        const desc = document.getElementById("record-desc").value.trim();

        if(title === "" || desc === "") {
            alert("الرجاء ملء الحقول أولاً");
            return;
        }

        const recordsRef = ref(database, 'site_data/records');
        const newRecordRef = push(recordsRef); // توليد معرف فريد تلقائي للسجل داخل الفايربيس
        
        set(newRecordRef, {
            title: title,
            description: desc,
            timestamp: new Date().toISOString()
        }).then(() => {
            // تنظيف الحقول بعد الإضافة الإيجابية
            document.getElementById("record-title").value = "";
            document.getElementById("record-desc").value = "";
        });
    }

    // جلب ومزامنة البيانات فوراً لجميع الأجهزة بدون ريفريش (Real-time Sync)
    function listenToLiveData() {
        const recordsRef = ref(database, 'site_data/records');

        onValue(recordsRef, (snapshot) => {
            const tableBody = document.getElementById("data-table-body");
            tableBody.innerHTML = ""; // تنظيف الجدول القديم قبل عرض المحدث
            
            const data = snapshot.val();
            if (data) {
                // تكرار لعرض كل السجلات الموجودة في الفايربيس
                Object.keys(data).forEach((key) => {
                    const record = data[key];
                    const row = `<tr>
                        <td>${key.substring(1, 6)}...</td>
                        <td>${record.title}</td>
                        <td>${record.description}</td>
                    </tr>`;
                    tableBody.innerHTML += row;
                });
            } else {
                tableBody.innerHTML = "<tr><td colspan='3'>لا توجد بيانات حالياً في قاعدة البيانات.</td></tr>";
            }
        });
    }

    // دالة إظهار لوحة التحكم وتحويل الواجهة
    function showDashboard(adminUsername) {
        document.getElementById("login-page").classList.remove("active");
        document.getElementById("dashboard-page").classList.add("active");
        document.getElementById("active-admin-name").innerText = adminUsername;
    }

    // دالة تسجيل الخروج العادي
    window.logout = function() {
        forceLogout();
    }

    // دالة الطرد ومسح الجلسة
    function forceLogout() {
        localStorage.removeItem("current_admin_user");
        localStorage.removeItem("admin_session_id");
        document.getElementById("dashboard-page").classList.remove("active");
        document.getElementById("login-page").classList.add("active");
    }

    // فحص تلقائي عند فتح الصفحة لو كان الأدمن مسجلاً مسبقاً ولم يتم طرده
    window.onload = function() {
        const savedAdmin = localStorage.getItem("current_admin_user");
        const savedSession = localStorage.getItem("admin_session_id");
        
        if (savedAdmin && savedSession) {
            showDashboard(savedAdmin);
            watchAdminSession(savedAdmin, savedSession);
            listenToLiveData();
        }
    };

</script>

</body>
</html>
