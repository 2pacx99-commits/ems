                    نظام إدارة إسعاف تورونتو
                </h1>
                <p class="text-sm text-gray-400 mt-1">لوحة المتابعة الميدانية وإحصائيات الطاقم الطبي</p>
            </div>
            <div class="text-left dir-ltr">
                <span class="px-4 py-2 rounded-full bg-red-950/40 border border-red-800/60 text-red-400 font-semibold text-sm shadow-[0_0_15px_rgba(239,68,68,0.1)]">

        </header>

        <section class="grid grid-cols-1 md:grid-cols-3 gap-6">
            <div class="glass-card p-6 rounded-2xl flex items-center justify-between shadow-xl">
                <div>
                    <p class="text-sm text-gray-400 font-medium">إجمالي الطاقم الفعلي</p>
                    <h3 id="total-active" class="text-3xl font-bold mt-2 text-white">0</h3>
                </div>
                <div class="p-3 bg-blue-500/10 rounded-xl text-blue-400">
                    🚑
                </div>
            </div>
            <div class="glass-card p-6 rounded-2xl flex items-center justify-between shadow-xl">
                <div>
                    <p class="text-sm text-gray-400 font-medium">القيادة العليا</p>
                    <h3 id="total-leaders" class="text-3xl font-bold mt-2 text-red-400">0</h3>
                </div>
                <div class="p-3 bg-red-500/10 rounded-xl text-red-400">
                    👑
                </div>
            </div>
            <div class="glass-card p-6 rounded-2xl flex items-center justify-between shadow-xl">
                <div>
                    <p class="text-sm text-gray-400 font-medium">المقاعد الشاغرة المتاحة</p>
                    <h3 id="total-empty" class="text-3xl font-bold mt-2 text-gray-400">0</h3>
                </div>
                <div class="p-3 bg-gray-500/10 rounded-xl text-gray-400">
                    ➕
                </div>
            </div>
        </section>

        <main class="glass-card rounded-2xl shadow-2xl overflow-hidden border border-gray-800">
            <div class="p-6 border-b border-gray-800 flex justify-between items-center bg-gray-900/40">
                <h2 class="text-lg font-semibold text-white flex items-center gap-2">
                    <span class="w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    قائمة شؤون الموظفين الحالية
                </h2>
            </div>
            
            <div class="overflow-x-auto custom-scrollbar">
                <table class="w-full text-right border-collapse">
                    <thead>
                        <tr class="bg-gray-900/80 text-gray-400 text-xs font-semibold uppercase tracking-wider border-b border-gray-800">
                            <th class="p-4">الكود</th>
                            <th class="p-4">الاسم</th>
                            <th class="p-4">الرتبة</th>
                            <th class="p-4">القسم</th>
                            <th class="p-4">المركبة</th>
                            <th class="p-4 text-center">سجل حضور الأسبوع</th>
                            <th class="p-4 text-center">الإنذارات</th>
                            <th class="p-4 text-center">الأوسمة</th>
                        </tr>
                    </thead>
                    <tbody id="table-body" class="divide-y divide-gray-800/50 text-sm">
                        </tbody>
                </table>
            </div>
        </main>

    </div>

            "rankConfig": {
                "قيادة": {"color": "#ef4444", "min": 1, "max": 20},
                "دكتور": {"color": "#0ea5e9", "min": 21, "max": 100},
                "مسعف": {"color": "#22c55e", "min": 101, "max": 300},
                "متدرب": {"color": "#eab308", "min": 301, "max": 600}
            }
        };

        function renderDashboard() {
            const tbody = document.getElementById('table-body');
            let activeCount = 0;
            let leaderCount = 0;
            let emptyCount = 0;

            tbody.innerHTML = '';

            emsData.hospitalData.forEach(member => {
                const isVacant = !member.name;
                
                if (isVacant) {
                    emptyCount++;
                } else {
                    activeCount++;
                    if (member.rank === 'قيادة') leaderCount++;
                }

                // تحديد ثيم ولون الرتبة بناءً على الإعدادات المرفقة
                const rankInfo = emsData.rankConfig[member.rank] || { color: '#9ca3af' };
                const rankBadgeStyle = !isVacant 
                    ? `background-color: ${rankInfo.color}20; color: ${rankInfo.color}; border: 1px solid ${rankInfo.color}40;`
                    : '';

                // تصميم مؤشرات الحضور والغياب (النقاط الملونة)
                const attendanceDots = member.attendance.map(status => {
                    if (status === 'present') return `<span class="w-2.5 h-2.5 rounded-full bg-emerald-500 shadow-[0_0_8px_#10b981]" title="حاضر"></span>`;
                    if (status === 'absent') return `<span class="w-2.5 h-2.5 rounded-full bg-rose-500 shadow-[0_0_8px_#f43f5e]" title="غائب"></span>`;
                    return `<span class="w-2.5 h-2.5 rounded-full bg-gray-700" title="لا يوجد سجل"></span>`;
                }).join('');

                // إنشاء سطر الجدول
                const row = document.createElement('tr');
                row.className = isVacant 
                    ? 'hover:bg-gray-800/10 opacity-40 transition-colors' 
                    : 'hover:bg-gray-800/30 transition-colors border-b border-gray-800/40';

                row.innerHTML = `
                    <td class="p-4 font-mono text-xs font-semibold text-gray-400">${member.code || '---'}</td>
                    <td class="p-4 font-semibold ${isVacant ? 'text-gray-600 italic' : 'text-white'}">
                        ${member.name || 'مكتب شاغر / متاح للتوظيف'}
                    </td>
                    <td class="p-4">
                        ${isVacant ? '---' : `<span class="px-2.5 py-1 rounded-md text-xs font-bold" style="${rankBadgeStyle}">${member.rank}</span>`}
                    </td>
                    <td class="p-4 text-gray-300">${member.department || '---'}</td>
                    <td class="p-4 text-gray-400 text-xs">${member.vehicle || '---'}</td>
                    <td class="p-4">
                        <div class="flex justify-center items-center gap-1.5 dir-ltr">
                            ${attendanceDots}
                        </div>
                    </td>
                    <td class="p-4 text-center">
                        <span class="${member.warnings !== '0/3' ? 'text-amber-500 font-bold' : 'text-gray-500'} text-xs">
                            ${member.warnings}
                        </span>
                    </td>
                    <td class="p-4 text-center text-sm">${member.medal || '---'}</td>
                `;
                tbody.appendChild(row);
            });

            // تحديث بطاقات الإحصائيات العليا
            document.getElementById('total-active').innerText = activeCount;
            document.getElementById('total-leaders').innerText = leaderCount;
            document.getElementById('total-empty').innerText = emptyCount;
        }

        // تشغيل الدالة فور تحميل الصفحة
        document.addEventListener('DOMContentLoaded', renderDashboard);
