<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>مستودع ملصقات الأنمي المضحكة 🎭</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #1a1a2e;
            color: #ffffff;
            margin: 0;
            padding: 0;
            text-align: center;
        }
        header {
            background-color: #0f3460;
            padding: 30px 20px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }
        header h1 {
            color: #e94560;
            margin: 0;
            font-size: 2.5rem;
        }
        header p {
            color: #b8b8d1;
            font-size: 1.1rem;
            margin-top: 10px;
        }
        .container {
            max-width: 1200px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 25px;
        }
        .card {
            background-color: #16213e;
            border: 2px solid #0f3460;
            border-radius: 12px;
            padding: 20px;
            transition: transform 0.3s ease, border-color 0.3s ease;
            box-shadow: 0 4px 6px rgba(0,0,0,0.2);
        }
        .card:hover {
            transform: translateY(-5px);
            border-color: #e94560;
        }
        .card img {
            width: 100%;
            height: 220px;
            object-fit: cover;
            border-radius: 8px;
            background-color: #0f3460;
        }
        .card h3 {
            margin: 15px 0 8px 0;
            color: #e94560;
            font-size: 1.3rem;
        }
        .card p {
            color: #adadb9;
            font-size: 0.95rem;
            margin-bottom: 15px;
        }
        .btn {
            background-color: #e94560;
            color: white;
            border: none;
            padding: 12px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: bold;
            font-size: 1rem;
            width: 100%;
            transition: background 0.2s;
        }
        .btn:hover {
            background-color: #ff6b81;
        }
    </style>
</head>
<body>

    <header>
        <h1>مستودع ميمز وملصقات الأنمي 🎭</h1>
        <p>أغرب وأقوى تعبيرات وجوه الأنمي للضحك والطقطقة مع ربعك!</p>
    </header>

    <div class="container">
        <div class="grid">
            
            <!-- الملصق الأول -->
            <div class="card">
                <img src="https://via.placeholder.com/300x220?text=Shocked+Anime+Face" alt="ملصق أنمي">
                <h3>وجه الصدمة الأسطوري</h3>
                <p>لما تشوف أسئلة الامتحان مالها علاقة بالمنهج</p>
                <button class="btn">تحميل الملصق</button>
            </div>

            <!-- الملصق الثاني -->
            <div class="card">
                <img src="https://via.placeholder.com/300x220?text=Side+Eye+Anime" alt="ملصق أنمي">
                <h3>نظرة "شدا تحس؟"</h3>
                <p>تستعملها لما صاحبك يگول سالفة ميتصدگ</p>
                <button class="btn">تحميل الملصق</button>
            </div>

            <!-- الملصق الثالث -->
            <div class="card">
                <img src="https://via.placeholder.com/300x220?text=Cry+Anime+Meme" alt="ملصق أنمي">
                <h3>البكاء الدرامي</h3>
                <p>لما تخلص الحلقة الأخيرة من أنمي المفضلك وينتهي بتموت البطل</p>
                <button class="btn">تحميل الملصق</button>
            </div>

        </div>
    </div>

</body>
</html>
