<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم الهلال الأحمر</title>
    <style>
        body {
            background-color: #1a1a2e;
            color: #ffffff;
            font-family: sans-serif;
            margin: 0;
            padding: 20px;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            background-color: #16213e;
        }
        th, td {
            padding: 15px;
            border: 1px solid #0f3460;
            text-align: center;
        }
        th {
            background-color: #0f3460;
        }
        h2 {
            text-align: center;
        }
    </style>
</head>
<body>

    <h2>لوحة تحكم الهلال الأحمر</h2>

    <table>
        <thead>
            <tr>
                <th>الاسم</th>
                <th>الكود</th>
                <th>الرتبة</th>
                <th>الحالة</th>
            </tr>
        </thead>
        <tbody id="ems-table-body">
            </tbody>
    </table>

    <script>
        // هنا يمكنك إضافة منطق جلب البيانات من LocalStorage أو أي مصدر آخر
        const data = JSON.parse(localStorage.getItem('emsData')) || [];
        const tableBody = document.getElementById('ems-table-body');
        
        data.forEach(item => {
            const row = `<tr>
                <td>${item.name}</td>
                <td>${item.code}</td>
                <td>${item.rank}</td>
                <td>${item.status}</td>
            </tr>`;
            tableBody.innerHTML += row;
        });
    </script>
</body>
