<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MDT V1</title>

<style>
body{
    margin:0;
    font-family:tahoma;
    background:#0a192f;
    color:white;
}

header{
    padding:15px;
    background:#112240;
    text-align:center;
    font-size:22px;
    font-weight:bold;
}

.container{
    display:flex;
    height:calc(100vh - 60px);
}

/* sidebar */
.sidebar{
    width:220px;
    background:#112240;
    padding:10px;
}

.btn{
    width:100%;
    padding:12px;
    margin:5px 0;
    border:none;
    cursor:pointer;
    background:#00d2ff;
    font-weight:bold;
}

/* content */
.content{
    flex:1;
    padding:20px;
}

/* table */
table{
    width:100%;
    border-collapse:collapse;
    margin-top:10px;
}

th,td{
    border:1px solid #333;
    padding:8px;
    text-align:center;
}

input{
    padding:10px;
    width:100%;
    margin:5px 0;
}

/* modal */
.modal{
    position:fixed;
    top:0;left:0;
    width:100%;height:100%;
    background:rgba(0,0,0,0.7);
    display:none;
    justify-content:center;
    align-items:center;
}

.box{
    background:#112240;
    padding:20px;
    width:300px;
}
</style>
</head>

<body>

<header>MDT SYSTEM V1</header>

<div class="container">

<!-- SIDEBAR -->
<div class="sidebar">
    <button class="btn" onclick="show('officers')">الضباط</button>
</div>

<!-- CONTENT -->
<div class="content">

<h2>إدارة الضباط</h2>

<button class="btn" onclick="openModal()">+ إضافة ضابط</button>

<table>
<thead>
<tr>
<th>الاسم</th>
<th>الرتبة</th>
<th>تحكم</th>
</tr>
</thead>
<tbody id="table"></tbody>
</table>

</div>
</div>

<!-- MODAL -->
<div class="modal" id="modal">
<div class="box">
<h3>إضافة ضابط</h3>

<input id="name" placeholder="اسم الضابط">
<input id="rank" placeholder="الرتبة">

<button class="btn" onclick="add()">حفظ</button>
<button class="btn" onclick="closeModal()">إغلاق</button>
</div>
</div>

<script>
let data = JSON.parse(localStorage.getItem("officers")) || [];

function render(){
    let table = document.getElementById("table");
    table.innerHTML = "";

    data.forEach((o,i)=>{
        table.innerHTML += `
        <tr>
            <td>${o.name}</td>
            <td>${o.rank}</td>
            <td>
                <button onclick="del(${i})">حذف</button>
            </td>
        </tr>`;
    });

    localStorage.setItem("officers", JSON.stringify(data));
}

function add(){
    let name = document.getElementById("name").value;
    let rank = document.getElementById("rank").value;

    if(!name || !rank) return;

    data.push({name, rank});
    render();
    closeModal();
}

function del(i){
    data.splice(i,1);
    render();
}

function openModal(){
    document.getElementById("modal").style.display="flex";
}

function closeModal(){
    document.getElementById("modal").style.display="none";
}

render();
</script>

</body>
</html>
