<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>جدول الهلال الأحمر - TORONTO RP</title>
    <style>
        /* (نفس الستايل السابق الخاص بك مع إضافة تنسيقات للمودال الجديد) */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        :root { --bg-color: #030816; --panel-bg: rgba(6, 14, 38, 0.75); --neon-blue: #00d2ff; }
        body { background-color: var(--bg-color); color: #e2e8f0; font-family: 'Cairo'; margin: 0; padding: 25px; }
        .modal-box { background: #060e26; border: 1px solid var(--neon-blue); padding: 30px; border-radius: 16px; color: white; width: 600px; max-height: 90vh; overflow-y: auto; }
        .settings-section { margin-bottom: 30px; padding: 15px; border: 1px solid rgba(255,255,255,0.1); border-radius: 10px; }
    </style>
</head>
<body>

    <div class="modal-overlay" id="settingsModal">
        <div class="modal-box">
            <h3>⚙️ لوحة التحكم والإدارة</h3>
            
            <div class="settings-section">
                <h4>🛠️ إدارة الرتب</h4>
                <div id="ranks-list-manage"></div>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <input type="text" id="new-rank-name" placeholder="اسم الرتبة" style="flex:1; padding:8px; background:#030716; border:1px solid #444; color:white;">
                    <input type="color" id="new-rank-color" value="#00d2ff">
                    <button onclick="addRankAction()" style="background:var(--neon-blue); border:none; padding:8px; cursor:pointer;">إضافة</button>
                </div>
            </div>

            <div class="settings-section">
                <h4>🏅 إدارة الأوسمة</h4>
                <div id="badges-list-manage"></div>
                <div style="display:flex; gap:5px; margin-top:10px;">
                    <input type="text" id="new-badge-name" placeholder="اسم الوسام" style="flex:1; padding:8px; background:#030716; border:1px solid #444; color:white;">
                    <input type="color" id="new-badge-color" value="#ffaa00">
                    <button onclick="addBadgeAction()" style="background:#ffaa00; border:none; padding:8px; cursor:pointer;">إضافة</button>
                </div>
            </div>

            <button onclick="saveGlobalSettings()" style="width:100%; padding:15px; background:#00ff87; border:none; border-radius:8px; font-weight:bold; cursor:pointer;">حفظ كل الإعدادات</button>
        </div>
    </div>

    <script>
        // دالة إضافة رتبة
        function addRankAction() {
            const name = document.getElementById('new-rank-name').value;
            const color = document.getElementById('new-rank-color').value;
            if(name) {
                appData.ranks.push({name, color});
                renderSettings(); renderApp();
            }
        }

        // دالة إضافة وسام
        function addBadgeAction() {
            const name = document.getElementById('new-badge-name').value;
            const color = document.getElementById('new-badge-color').value;
            if(name) {
                appData.badges.push({name, color});
                renderSettings(); renderApp();
            }
        }

        // دالة حذف رتبة/وسام
        function deleteItem(type, index) {
            if(type === 'rank') appData.ranks.splice(index, 1);
            else appData.badges.splice(index, 1);
            renderSettings(); renderApp();
        }

        // عرض الإعدادات داخل المودال
        function renderSettings() {
            const rList = document.getElementById('ranks-list-manage');
            const bList = document.getElementById('badges-list-manage');
            
            rList.innerHTML = appData.ranks.map((r, i) => `
                <div class="item-row-manage">
                    <span style="color:${r.color}">${r.name}</span>
                    <button onclick="deleteItem('rank', ${i})">❌</button>
                </div>`).join('');

            bList.innerHTML = appData.badges.map((b, i) => `
                <div class="item-row-manage">
                    <span style="color:${b.color}">${b.name}</span>
                    <button onclick="deleteItem('badge', ${i})">❌</button>
                </div>`).join('');
        }

        // استدعاء renderSettings عند فتح الإعدادات
        function toggleModal(id, show) {
            document.getElementById(id).classList.toggle('open', show);
            if(id === 'settingsModal' && show) renderSettings();
        }

        // [بقية الدوال الخاصة بك (renderApp, saveGlobalSettings, إلخ) تعمل الآن مع البيانات المحدثة تلقائياً]
        // تأكد من ربط الدوال الأساسية كما في الكود السابق.
    </script>
</body>
</html>
