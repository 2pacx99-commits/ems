<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>نظام MDT تورنتو الاحترافي</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700&family=Tajawal:wght@300;400;700&family=Changa:wght@300;400;700&family=IBM+Plex+Sans+Arabic:wght@300;400;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root {
            --bg-deep: #050b14;
            --police-blue: #0a2540;
            --neon-cyan: #00f2ff;
            --danger: #ff3e3e;
            --success: #00ff9d;
            --warning: #ffcc00;
            --glass: rgba(10, 37, 64, 0.7);
            --font-main: 'Cairo', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; cursor: none; }
        body { font-family: var(--font-main); background: var(--bg-deep); color: white; overflow: hidden; height: 100vh; }

        /* Custom Cursor */
        #cursor { width: 20px; height: 20px; border: 2px solid var(--neon-cyan); border-radius: 50%; position: fixed; pointer-events: none; z-index: 9999; transition: transform 0.1s; box-shadow: 0 0 10px var(--neon-cyan); }
        
        /* Background Canvas */
        #bgCanvas { position: fixed; top: 0; left: 0; z-index: -1; }

        /* Layout */
        .app-container { display: flex; height: 100vh; width: 100vw; overflow: hidden; background: radial-gradient(circle at center, rgba(0,242,255,0.05) 0%, transparent 70%); }
        
        /* Sidebar */
        .sidebar { width: 260px; background: var(--glass); backdrop-filter: blur(20px); border-left: 1px solid var(--neon-cyan); display: flex; flex-direction: column; padding: 20px; }
        .nav-item { padding: 15px; margin: 5px 0; border-radius: 8px; background: rgba(255,255,255,0.05); transition: 0.3s; border-right: 3px solid transparent; cursor: pointer; }
        .nav-item:hover { background: rgba(0,242,255,0.1); border-right: 3px solid var(--neon-cyan); }

        /* Content */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .card { background: var(--glass); border: 1px solid rgba(255,255,255,0.1); border-radius: 15px; padding: 20px; box-shadow: 0 8px 32px rgba(0,0,0,0.5); }

        /* Charts */
        .chart-container { width: 100%; height: 300px; }

        /* Animations */
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
        .neon-text { text-shadow: 0 0 10px var(--neon-cyan); }
    </style>
</head>
<body>

<div id="cursor"></div>
<canvas id="bgCanvas"></canvas>

<div class="app-container">
    <div class="sidebar">
        <h2 class="neon-text" style="margin-bottom: 30px;">شرطة تورنتو</h2>
        <div class="nav-item" onclick="showSection('dashboard')">لوحة التحكم</div>
        <div class="nav-item" onclick="showSection('wanted')">المطلوبون</div>
        <div class="nav-item" onclick="showSection('reports')">البلاغات</div>
        <div class="nav-item" onclick="showSection('settings')">الإعدادات</div>
    </div>

    <div class="main-content" id="main-view">
        <div id="dashboard" class="view">
            <h1>لوحة التحكم</h1>
            <div class="card">
                <canvas id="mainChart"></canvas>
            </div>
        </div>
        <div id="wanted" class="view" style="display:none;">
            <h1>سجل المطلوبين</h1>
            <button onclick="addWanted()">إضافة مطلوب</button>
            <table id="wantedTable" style="width:100%; margin-top:20px;">
                <thead><tr><th>الاسم</th><th>المستوى</th><th>الحالة</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    // State Management
    let state = JSON.parse(localStorage.getItem('mdt_data')) || {
        wanted: [{name: 'أحمد علي', level: 'عالي', status: 'مطلوب'}],
        settings: { theme: 'dark' }
    };

    function save() { localStorage.setItem('mdt_data', JSON.stringify(state)); }

    // Canvas Background
    const canvas = document.getElementById('bgCanvas');
    const ctx = canvas.getContext('2d');
    canvas.width = window.innerWidth;
    canvas.height = window.innerHeight;

    function draw() {
        ctx.fillStyle = 'rgba(5, 11, 20, 0.1)';
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        // Add random grid/particle logic here
        requestAnimationFrame(draw);
    }
    draw();

    // Mouse System
    const cursor = document.getElementById('cursor');
    window.addEventListener('mousemove', e => {
        cursor.style.left = e.clientX + 'px';
        cursor.style.top = e.clientY + 'px';
    });

    // UI Logic
    function showSection(id) {
        document.querySelectorAll('.view').forEach(v => v.style.display = 'none');
        document.getElementById(id).style.display = 'block';
    }

    // Chart Init
    const ctxChart = document.getElementById('mainChart').getContext('2d');
    new Chart(ctxChart, {
        type: 'line',
        data: {
            labels: ['يناير', 'فبراير', 'مارس'],
            datasets: [{ label: 'البلاغات', data: [12, 19, 3], borderColor: '#00f2ff' }]
        },
        options: { responsive: true, maintainAspectRatio: false }
    });

    function addWanted() {
        state.wanted.push({name: 'مشتبه جديد', level: 'متوسط', status: 'نشط'});
        save();
        alert('تمت الإضافة');
    }
</script>
</body>
</html>
